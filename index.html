<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VisionGuide — AI Vision Assistant</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── Setup Screen ─────────────────────────────────────────── -->
  <div id="setup-screen" class="screen">
    <div class="setup-container">
      <div class="app-icon" aria-hidden="true">👁️</div>
      <h1 class="app-title">VisionGuide</h1>
      <p class="app-tagline">Your AI eyes, always watching</p>

      <div class="input-group">
        <label for="api-key">Gemini API Key</label>
        <input
          type="password"
          id="api-key"
          placeholder="Paste your API key here"
          autocomplete="off"
          aria-label="Gemini API Key"
        >
      </div>

      <div class="input-group">
        <label for="fps-select">Camera FPS</label>
        <select id="fps-select" aria-label="Camera frames per second">
          <option value="1">1 FPS (low bandwidth)</option>
          <option value="2" selected>2 FPS (recommended)</option>
          <option value="3">3 FPS</option>
          <option value="5">5 FPS (high detail)</option>
        </select>
      </div>

      <button id="start-btn" class="start-btn" aria-label="Start VisionGuide">
        Start VisionGuide
      </button>

      <div class="setup-footer">
        Need an API key? Get one free at<br>
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a>
      </div>
    </div>
  </div>

  <!-- ── Session Screen ───────────────────────────────────────── -->
  <div id="session-screen" class="screen hidden">
    <div class="session-container">
      <!-- Camera feed fills viewport -->
      <video id="camera-preview" class="camera-video" playsinline muted autoplay aria-label="Camera preview"></video>
      <div class="camera-overlay"></div>

      <!-- Status bar -->
      <div class="status-bar">
        <div class="status-indicator">
          <div id="status-dot" class="status-dot" aria-hidden="true"></div>
          <span id="status-text" class="status-text">Connecting…</span>
        </div>
        <button id="stop-btn" class="stop-btn" aria-label="End session">End</button>
      </div>

      <!-- Pulse ring (visible when AI speaks) -->
      <div class="pulse-ring-container">
        <div id="pulse-ring" class="pulse-ring" aria-hidden="true"></div>
      </div>

      <!-- Error banner -->
      <div id="error-banner" class="error-banner" role="alert">
        <span id="error-text"></span>
      </div>

      <!-- Bottom controls -->
      <div class="controls-bar">
        <button id="mic-btn" class="control-btn" aria-label="Mute microphone">
          <span class="btn-icon">🎙️</span>
          <span class="btn-label">Mute</span>
        </button>
        <button id="switch-cam-btn" class="control-btn" aria-label="Switch camera">
          <span class="btn-icon">🔄</span>
          <span class="btn-label">Flip</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
