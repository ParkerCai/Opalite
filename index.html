<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Opalite — AI Vision Assistant</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=26">
</head>
<body>

  <!-- ── Setup Screen ─────────────────────────────────────────── -->
  <div id="setup-screen" class="screen">
    <div class="setup-container">
      <img src="assets/opalite-stone.png" class="hero-img" alt="Opalite gemstone" aria-hidden="true">
      <h1 class="app-title">Opalite</h1>
      <p class="app-tagline">See through crafted light.</p>

      <input type="hidden" id="api-key">
      <script>
        // Show API key input if no key saved
        const k = window.OPALITE_API_KEY || localStorage.getItem('oe_apiKey');
        if (!k || k === 'PASTE_YOUR_KEY_HERE') {
          const inp = document.getElementById('api-key');
          inp.type = 'password';
          inp.placeholder = 'Paste your Gemini API key';
          inp.style.cssText = 'width:100%;padding:16px;background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#fff;font-size:18px;margin-bottom:20px;';
        }
      </script>

      <button id="start-btn" class="start-btn" aria-label="Start">
        Start
      </button>

      <div class="setup-footer">
        Powered by Gemini Live API
      </div>
    </div>
  </div>

  <!-- ── Session Screen ───────────────────────────────────────── -->
  <div id="session-screen" class="screen hidden">
    <div class="session-container">
      <!-- Camera feed fills viewport -->
      <video id="camera-preview" class="camera-video" playsinline muted autoplay aria-label="Camera preview"></video>
      <div class="camera-overlay"></div>

      <!-- Status bar -->
      <div class="status-bar">
        <div class="status-indicator">
          <div id="status-dot" class="status-dot" aria-hidden="true"></div>
          <span id="status-text" class="status-text">Connecting…</span>
        </div>
        <button id="stop-btn" class="stop-btn" aria-label="End session">End</button>
      </div>

      <!-- Tap zone — tap anywhere on camera to trigger description -->
      <div id="tap-zone" class="tap-zone" role="button" tabindex="0" aria-label="Tap to describe what's ahead"></div>

      <!-- Live region for TalkBack — announces status changes -->
      <div id="a11y-announce" aria-live="assertive" aria-atomic="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);"></div>

      <!-- Pulse ring (visible when AI speaks) -->
      <div class="pulse-ring-container">
        <div id="pulse-ring" class="pulse-ring" aria-hidden="true"></div>
      </div>

      <!-- Error banner -->
      <div id="error-banner" class="error-banner" role="alert">
        <span id="error-text"></span>
      </div>

      <!-- Debug: shows captured frame on tap (3 sec) -->
      <img id="debug-frame" style="display:none; position:absolute; bottom:140px; right:16px; width:160px; border:2px solid #00d4ff; border-radius:8px; z-index:20;" alt="debug frame">

      <!-- Bottom controls -->
      <div class="controls-bar">
        <button id="mic-btn" class="control-btn" aria-label="Mute microphone">
          <span class="btn-label">Mute</span>
        </button>
        <button id="switch-cam-btn" class="control-btn" aria-label="Switch camera">
          <span class="btn-label">Flip</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Exit confirmation modal -->
  <div id="exit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Confirm exit">
    <div class="modal-box">
      <p class="modal-text">End session?</p>
      <div class="modal-buttons">
        <button id="exit-cancel" class="modal-btn modal-btn-cancel" aria-label="Cancel">Cancel</button>
        <button id="exit-confirm" class="modal-btn modal-btn-confirm" aria-label="End session">End</button>
      </div>
    </div>
  </div>

  <!-- Local dev: paste your API key in config.local.js (gitignored) -->
  <script src="config.local.js" onerror=""></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
